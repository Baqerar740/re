<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagezU Store</title>
    <!-- ربط ملف الـ CSS الخاص بك -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- قسم الخلفية المموهة -->
    <div class="bg-wrapper">
        <img src="bg.jpg" alt="Background">
    </div>

    <header>
        <a href="https://baqezu.mystrikingly.com/" class="logo-link">
            <img src="logo.png" alt="Logo">
        </a>
    </header>

    <main class="container">
        <div class="text-section">
            <h1>AmongUs</h1>
            <div class="meta">PC | BaqezU | store </div>
            <p class="description">
                An online and local party game of 
teamwork and betrayal for 4-15 players...in space!
            </p>
            <div class="btn-group">
                <!-- ⬇️ ضع رابط تحميل اللعبة هنا مكان علامة # ⬇️ -->
                <a href="https://www.imagenetz.de/files/aae093e4c09209b03bf45f822048b085.zip" target="_blank" class="btn-download">Download</a>
            </div>
        </div>

        <div class="poster-section">
            <img src="game.jpg" alt="Game Poster">
            <br>
            <!-- الزر ينقلك لرابط الفيديو مباشرة -->
            <a href="https://www.youtube.com/watch?v=9pyYq9lpjls" target="_blank" class="trailer-btn">▶ شاهد الإعلان الآن</a>
        </div>
    </main>

</body>
</html>
